name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files in workspace for debugging
        run: |
          ls -la
          echo "Listing utils/virtual_space_sim/ :"
          ls -la utils/virtual_space_sim/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          # Using a YAML list for the path, and ensuring it's quoted
          cache-dependency-path: |
            utils/virtual_space_sim/package-lock.json

      - name: Install dependencies
        run: cd utils/virtual_space_sim && npm ci

      - name: Build project
        run: cd utils/virtual_space_sim && npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: utils/virtual_space_sim/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
