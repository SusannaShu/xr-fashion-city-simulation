name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Or a version compatible with your project
          cache: 'npm'
          cache-dependency-path: utils/virtual_space_sim/package-lock.json # Adjust if your lock file is elsewhere or named differently

      - name: Install dependencies
        # We need to change directory to where package.json is
        run: cd utils/virtual_space_sim && npm ci # Using ci for cleaner installs in CI

      - name: Build project
        # We need to change directory to where package.json is
        run: cd utils/virtual_space_sim && npm run build
        env:
          # If your build requires environment variables, set them here
          # For example, if you have a public base path for GitHub Pages:
          # VITE_BASE_URL: /${{ github.event.repository.name }}/ # Or your repo name
          # NODE_ENV: production # Often set by build tools automatically

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path to the directory containing the static assets to deploy
          path: utils/virtual_space_sim/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
